<!DOCTYPE html>
<html>

<head>
<title>Unlock Our Memory ✨</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quiz-box">

<h1>✨ Memory Unlock Challenge 💖</h1>

<h2 id="question">
What was the most special thing about our first month? 🌸
</h2>

<button onclick="nextQuestion()">Our talks 💬</button>

<button onclick="nextQuestion()">Our memories 📸</button>

<button onclick="nextQuestion()">Our smiles ❤️</button>

</div>


<script>

let count = 0;

let questions = [
"What is one thing that always makes you happy? 😊",
"Are you ready to see our special memory? ✨"
];


function nextQuestion(){

if(count < questions.length){

document.getElementById("question").innerHTML = questions[count];

count++;

}

else{

window.location.href="memory.html";

}

}

</script>

</body>

</html>
