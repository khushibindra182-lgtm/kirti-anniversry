<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1 Month ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="loader">
✨ Creating a little magic for you... ✨
</div>
<div id="passwordScreen">
  <div class="box">
    <h1>❤️ Welcome My Love ❤️</h1>
    <p>A little surprise is waiting for you...</p>

    <input type="password" id="password" placeholder="Enter our secret">

    <button onclick="checkPassword()">Unlock ❤️</button>

    <p id="wrong"></p>
  </div>
</div>

<div id="mainPage">

<h1>Happy 1 Month Anniversary ❤️</h1>

<p>
Together for <span id="days"></span> days ❤️
</p>

<button id="musicBtn">🎵 Play Music</button>

<h2>📸 Our Memories</h2>

<div class="gallery">

<img src="photo1.jpg" alt="Photo 1">
<img src="photo2.jpg" alt="Photo 2">
<img src="photo3.jpg" alt="Photo 3">
<img src="photo4.jpg" alt="Photo 4">
<img src="photo5.jpg" alt="Photo 5">
<img src="photo6.jpg" alt="Photo 6">
<img src="photo7.jpg" alt="Photo 7">
<img src="photo8.jpg" alt="Photo 8">



<button id="letterBtn">
💌 Open My Letter
</button>

<div id="letter">

<h2>My Love ❤️</h2>

<p id="typing"></p>

</div>

<button id="giftBtn">
🎁 Final Surprise
</button>

<div id="giftMessage">

<h1>I Love You ❤️</h1>

<p>
Happy One Month Anniversary ❤️
</p>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</div>

</body>
</html>
