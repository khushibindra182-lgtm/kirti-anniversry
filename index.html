<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1 Month ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="passwordScreen">
    <div class="box">
        <h1>❤️ Welcome My Love ❤️</h1>
        <p>This surprise is only for you 💖</p>

        <input type="password" id="password" placeholder="Enter our secret">

        <button onclick="checkPassword()">Unlock ❤️</button>

        <p id="wrong"></p>
    </div>
</div>

<div id="mainPage">

<div class="hearts"></div>
<div class="petals"></div>

<h1>Happy 1 Month Anniversary ❤️</h1>

<p class="days">
Together for
<span id="days"></span>
days ❤️
</p>

<button id="musicBtn">
🎵 Play Music
</button>

<h2>📸 Our Memories</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">

</div>

<button id="letterBtn">
💌 Open My Letter
</button>

<div id="letter">

<h2>My Love ❤️</h2>

<p id="typing"></p>

</div>

<button id="giftBtn">
🎁 Final Surprise
</button>

<div id="giftMessage">
<h1>I Love You So Much ❤️</h1>
<p>Happy One Month My Princess 🌸</p>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
