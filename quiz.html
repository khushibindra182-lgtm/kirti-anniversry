<!DOCTYPE html>
<html>
<head>
<title>Our Magical Story ✨</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quiz-box">

<h1>🏰 Our Little Fairytale ✨</h1>

<h2>When did our beautiful story begin? 💖</h2>

<button>The day we met 🌹</button>
<br>

<button>The day we started talking ⭐</button>
<br>

<button>The day we became us 💕</button>

<p>✨ Unlock the magic one answer at a time ✨</p>

</div>
<script>
function createMagic(){

let magic = document.createElement("div");

magic.innerHTML = ["✨","💖","⭐","❤️"][Math.floor(Math.random()*4)];

magic.style.position = "fixed";
magic.style.bottom = "-20px";
magic.style.left = Math.random()*100 + "vw";
magic.style.fontSize = "25px";
magic.style.animation = "float 6s linear";

document.body.appendChild(magic);

setTimeout(()=>{
magic.remove();
},6000);

}

setInterval(createMagic,300);
</script>
</body>
</html>
